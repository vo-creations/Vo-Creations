<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vo Creations — Creator Leaderboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.7.0/dist/tabler-icons.min.css">
<style>
  :root{
    --grad: linear-gradient(135deg,#8B5CF6 0%,#EC4899 55%,#F472B6 100%);
    --grad-soft: linear-gradient(135deg,rgba(139,92,246,.22),rgba(236,72,153,.22));
    --gold: linear-gradient(135deg,#FFE259,#F7971E);
    --silver: linear-gradient(135deg,#E2E8F0,#94A3B8);
    --bronze: linear-gradient(135deg,#FBBF24,#B45309);
    --you: linear-gradient(135deg,#2DD4BF,#10B981);
    --ink:#F7F7FB; --muted:#A7A4C7; --faint:#6F6B97;
    --card:rgba(26,20,54,.66); --line:rgba(255,255,255,.08);
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    font-family:'Outfit',system-ui,sans-serif; color:var(--ink); min-height:100vh;
    background:
      radial-gradient(1100px 600px at 12% -8%, rgba(139,92,246,.30), transparent 60%),
      radial-gradient(900px 600px at 100% 0%, rgba(236,72,153,.24), transparent 55%),
      #0A0918;
    padding:32px 16px 60px;
  }
  .wrap{max-width:760px;margin:0 auto;}
  .topbar{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:22px;flex-wrap:wrap;}
  .brand{display:flex;align-items:center;gap:12px;}
  .brand .cup{
    width:46px;height:46px;border-radius:14px;display:grid;place-items:center;font-size:24px;color:#fff;
    background:var(--grad); box-shadow:0 8px 26px rgba(236,72,153,.45);
  }
  .brand h1{font-family:'Anton',sans-serif;font-size:30px;letter-spacing:1.5px;line-height:1;text-transform:uppercase;}
  .brand .sub{font-size:12.5px;color:var(--muted);letter-spacing:.3px;margin-top:3px;}
  select#campaign{
    appearance:none;background:rgba(255,255,255,.05);color:var(--ink);border:1px solid var(--line);
    border-radius:12px;padding:10px 38px 10px 14px;font-family:inherit;font-size:14px;font-weight:600;cursor:pointer;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='16' height='16' fill='none' stroke='%23A7A4C7' stroke-width='2'><path d='M4 6l4 4 4-4'/></svg>");
    background-repeat:no-repeat;background-position:right 12px center;
  }
  select#campaign:focus{outline:none;border-color:#EC4899;}
  .seg{display:inline-flex;background:rgba(255,255,255,.05);border:1px solid var(--line);border-radius:12px;padding:4px;gap:3px;}
  .seg button{
    border:none;background:transparent;color:var(--muted);font-family:inherit;font-size:13px;font-weight:600;
    padding:8px 15px;border-radius:9px;cursor:pointer;transition:.15s;
  }
  .seg button.on{background:var(--grad);color:#fff;box-shadow:0 6px 16px rgba(236,72,153,.4);}
  .controls{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:26px;flex-wrap:wrap;}

  .podium{display:grid;grid-template-columns:1fr 1.18fr 1fr;align-items:end;gap:12px;margin-bottom:14px;}
  .pod{position:relative;border-radius:20px;padding:20px 12px 18px;text-align:center;border:1px solid var(--line);
    background:var(--card);backdrop-filter:blur(8px);}
  .pod.p1{padding-top:30px;border-color:rgba(247,151,30,.5);box-shadow:0 0 0 1px rgba(255,210,80,.25),0 18px 50px rgba(247,151,30,.22);}
  .crown{position:absolute;top:-16px;left:50%;transform:translateX(-50%);font-size:26px;}
  .pod .av{margin:0 auto 10px;}
  .medal{position:absolute;top:12px;right:12px;font-size:12px;font-weight:800;width:24px;height:24px;border-radius:50%;display:grid;place-items:center;color:#1a1030;}
  .m1{background:var(--gold);} .m2{background:var(--silver);} .m3{background:var(--bronze);}
  .pod .nm{font-weight:700;font-size:14.5px;margin-top:2px;}
  .pod .hd{font-size:11.5px;color:var(--muted);margin:2px 0 9px;display:flex;align-items:center;gap:4px;justify-content:center;}
  .pod .vw{font-family:'Anton',sans-serif;font-size:23px;letter-spacing:.5px;
    background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent;}
  .pod.p1 .vw{font-size:30px;}
  .pod .vl{font-size:10.5px;color:var(--faint);letter-spacing:1px;text-transform:uppercase;margin-top:1px;}

  .av{width:54px;height:54px;border-radius:50%;display:grid;place-items:center;font-weight:800;font-size:18px;color:#fff;position:relative;}
  .av.sm{width:40px;height:40px;font-size:14px;}
  .av::after{content:"";position:absolute;inset:-3px;border-radius:50%;padding:3px;background:var(--grad);
    -webkit-mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);-webkit-mask-composite:xor;mask-composite:exclude;opacity:.9;}
  .pod.p1 .av::after{background:var(--gold);}

  .list{display:flex;flex-direction:column;gap:8px;margin-top:14px;}
  .row{display:flex;align-items:center;gap:14px;padding:11px 16px;border-radius:16px;border:1px solid var(--line);
    background:var(--card);transition:.15s;}
  .row:hover{border-color:rgba(236,72,153,.4);transform:translateX(2px);}
  .row.you{background:var(--grad-soft);border-color:rgba(45,212,191,.55);}
  .rank{font-family:'Anton',sans-serif;font-size:18px;width:30px;text-align:center;color:var(--muted);}
  .row.you .rank{color:#2DD4BF;}
  .meta{flex:1;min-width:0;}
  .meta .nm{font-weight:700;font-size:14.5px;display:flex;align-items:center;gap:8px;}
  .tag{font-size:10px;font-weight:700;letter-spacing:.4px;color:#0A0918;background:var(--you);padding:2px 7px;border-radius:6px;}
  .meta .hd{font-size:12px;color:var(--muted);display:flex;align-items:center;gap:5px;margin-top:2px;}
  .move{font-size:12.5px;font-weight:700;min-width:42px;text-align:right;display:flex;align-items:center;gap:3px;justify-content:flex-end;}
  .up{color:#34D399;} .down{color:#FB7185;} .flat{color:var(--faint);}
  .vw{font-family:'Outfit';font-weight:800;font-size:15.5px;min-width:78px;text-align:right;}
  .foot{text-align:center;color:var(--faint);font-size:12px;margin-top:22px;}
  .plat{font-size:13px;opacity:.85;}
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <div class="brand">
      <div class="cup"><i class="ti ti-trophy"></i></div>
      <div>
        <h1>Leaderboard</h1>
        <div class="sub" id="sub">Top creators by views</div>
      </div>
    </div>
    <select id="campaign"></select>
  </div>

  <div class="controls">
    <div class="seg" id="seg">
      <button data-w="7" class="on">7 days</button>
      <button data-w="30">30 days</button>
      <button data-w="all">All-time</button>
    </div>
    <div style="font-size:12px;color:var(--faint);"><i class="ti ti-refresh"></i> updates daily</div>
  </div>

  <div class="podium" id="podium"></div>
  <div class="list" id="list"></div>
  <div class="foot" id="foot"></div>
</div>

<script>
const palettes=[['#8B5CF6','#EC4899'],['#06B6D4','#3B82F6'],['#F59E0B','#EF4444'],['#10B981','#14B8A6'],['#F472B6','#A855F7'],['#22D3EE','#6366F1'],['#FB923C','#F43F5E']];
function hash(s){let h=0;for(let i=0;i<s.length;i++)h=s.charCodeAt(i)+((h<<5)-h);return Math.abs(h);}
function initials(n){return n.split(' ').map(w=>w[0]).slice(0,2).join('').toUpperCase();}
function fmt(n){return n.toLocaleString('en-US');}
const plat={tiktok:'ti-brand-tiktok',instagram:'ti-brand-instagram',youtube:'ti-brand-youtube'};
function avatar(name,small){const p=palettes[hash(name)%palettes.length];const d=document.createElement('div');
  d.className='av'+(small?' sm':'');d.style.background=`linear-gradient(135deg,${p[0]},${p[1]})`;d.textContent=initials(name);return d;}

const roster=[['Mara Ven','tiktok'],['Jon Reyes','instagram'],['Tia Brooks','youtube'],['Kai Mott','tiktok'],['Sam Idris','instagram'],['Lena Park','tiktok'],['Ravi Shah','youtube'],['Noa Klein','instagram'],['Eli Stone','tiktok'],['Priya Das','youtube']];
function gen(seed){return roster.map((r,i)=>{const b=((seed*7+i*13)%9)+1;return{name:r[0],handle:'@'+r[0].toLowerCase().replace(' ',''),platform:r[1],
  v7:b*1320+((i*seed)%600),v30:b*5400+((i*seed*3)%2400),vall:b*49000+i*1700+seed*900,move:((seed*3+i*5)%5)-2};});}
const campaigns=[{id:'overall',label:'Overall agency'},{id:'aonic',label:'Aonic'},{id:'notta',label:'Notta AI'},{id:'allin',label:'Allinmotion'},{id:'flux',label:'Flux Skincare'}];
const data={};campaigns.forEach((c,i)=>data[c.id]=gen(i+2));
const YOU='Kai Mott';

const sel=document.getElementById('campaign');
campaigns.forEach(c=>{const o=document.createElement('option');o.value=c.id;o.textContent=c.label;sel.appendChild(o);});
const state={c:'overall',w:'7'};
const val=r=>state.w==='7'?r.v7:state.w==='30'?r.v30:r.vall;
function move(m){if(m>0)return`<span class="move up"><i class="ti ti-caret-up-filled"></i>${m}</span>`;
  if(m<0)return`<span class="move down"><i class="ti ti-caret-down-filled"></i>${-m}</span>`;return`<span class="move flat">–</span>`;}

function render(){
  const rows=[...data[state.c]].sort((a,b)=>val(b)-val(a));
  document.getElementById('sub').textContent=campaigns.find(c=>c.id===state.c).label+' · top creators by views';
  const pod=document.getElementById('podium');pod.innerHTML='';
  const cls=['p1','p2','p3'];
  [1,0,2].forEach(idx=>{const r=rows[idx];if(!r)return;const d=document.createElement('div');d.className='pod '+cls[idx];
    if(idx===0)d.insertAdjacentHTML('beforeend','<div class="crown">👑</div>');
    d.insertAdjacentHTML('beforeend',`<div class="medal m${idx+1}">${idx+1}</div>`);
    d.appendChild(avatar(r.name,false));
    d.insertAdjacentHTML('beforeend',`<div class="nm">${r.name}</div><div class="hd"><i class="ti ${plat[r.platform]} plat"></i>${r.handle}</div><div class="vw">${fmt(val(r))}</div><div class="vl">views</div>`);
    pod.appendChild(d);});
  const list=document.getElementById('list');list.innerHTML='';
  rows.slice(3).forEach((r,i)=>{const row=document.createElement('div');row.className='row'+(r.name===YOU?' you':'');
    row.innerHTML=`<div class="rank">${i+4}</div>`;row.appendChild(avatar(r.name,true));
    row.insertAdjacentHTML('beforeend',`<div class="meta"><div class="nm">${r.name}${r.name===YOU?'<span class="tag">YOU</span>':''}</div><div class="hd"><i class="ti ${plat[r.platform]} plat"></i>${r.handle}</div></div>${move(r.move)}<div class="vw">${fmt(val(r))}</div>`);
    list.appendChild(row);});
  const lbl=state.w==='all'?'all-time':state.w+'-day';
  document.getElementById('foot').textContent=`Showing ${lbl} views  ·  ▲▼ = rank change vs previous period`;
}
sel.addEventListener('change',()=>{state.c=sel.value;render();});
document.getElementById('seg').addEventListener('click',e=>{const b=e.target.closest('button');if(!b)return;
  state.w=b.dataset.w;[...e.currentTarget.children].forEach(x=>x.classList.toggle('on',x===b));render();});
render();
</script>
</body>
</html>
