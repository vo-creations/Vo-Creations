name: build

# Catches build-breaking changes before merge. Production deploys from main via
# Vercel's git integration, so a green build here is the gate that keeps a broken
# commit from reaching prod.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
